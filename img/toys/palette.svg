<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Large swatches arranged in a pleasing layout -->
  <!-- Row 1 -->
  <rect x="40" y="60" width="90" height="90" rx="12" fill="#f97316"/>
  <rect x="155" y="60" width="90" height="90" rx="12" fill="#fb923c"/>
  <rect x="270" y="60" width="90" height="90" rx="12" fill="#fdba74"/>

  <!-- Row 2 -->
  <rect x="40" y="170" width="90" height="90" rx="12" fill="#8b5cf6"/>
  <rect x="155" y="170" width="90" height="90" rx="12" fill="#a78bfa"/>
  <rect x="270" y="170" width="90" height="90" rx="12" fill="#c4b5fd"/>

  <!-- HEX labels -->
  <text x="85" y="175" font-family="monospace" font-size="11" fill="#1e1b4b" text-anchor="middle">#f97316</text>
  <text x="200" y="175" font-family="monospace" font-size="11" fill="#1e1b4b" text-anchor="middle">#fb923c</text>
  <text x="315" y="175" font-family="monospace" font-size="11" fill="#92400e" text-anchor="middle">#fdba74</text>
  <text x="85" y="285" font-family="monospace" font-size="11" fill="#ede9fe" text-anchor="middle">#8b5cf6</text>
  <text x="200" y="285" font-family="monospace" font-size="11" fill="#ede9fe" text-anchor="middle">#a78bfa</text>
  <text x="315" y="285" font-family="monospace" font-size="11" fill="#4c1d95" text-anchor="middle">#c4b5fd</text>

  <!-- Label -->
  <text x="200" y="340" font-family="monospace" font-size="15" fill="#c4b5fd" text-anchor="middle" font-weight="bold">palette thief</text>
  <text x="200" y="362" font-family="monospace" font-size="11" fill="#7c3aed" text-anchor="middle">drop an image → get colors</text>
</svg>
