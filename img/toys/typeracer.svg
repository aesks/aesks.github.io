<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0a09"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg2)"/>

  <!-- Fake terminal / text editor chrome -->
  <rect x="30" y="50" width="340" height="220" rx="10" fill="#1c1917" stroke="#292524" stroke-width="1.5"/>
  <!-- Traffic lights -->
  <circle cx="55" cy="72" r="7" fill="#ef4444"/>
  <circle cx="76" cy="72" r="7" fill="#f59e0b"/>
  <circle cx="97" cy="72" r="7" fill="#22c55e"/>

  <!-- Typed text lines — green for correct, red for wrong -->
  <text x="50" y="115" font-family="monospace" font-size="14" fill="#86efac">The quick brown fox</text>
  <text x="50" y="138" font-family="monospace" font-size="14" fill="#86efac">jumps over the </text>
  <text x="50" y="161" font-family="monospace" font-size="14" fill="#fca5a5">layz</text>
  <text x="84" y="161" font-family="monospace" font-size="14" fill="#f3f4f6"> dog</text>
  <!-- blinking cursor -->
  <rect x="148" y="148" width="2" height="16" fill="#f3f4f6">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Stats bar -->
  <rect x="30" y="280" width="340" height="70" rx="10" fill="#292524"/>
  <text x="85" y="308" font-family="monospace" font-size="11" fill="#a8a29e" text-anchor="middle">WPM</text>
  <text x="85" y="330" font-family="monospace" font-size="22" fill="#facc15" text-anchor="middle" font-weight="bold">74</text>
  <text x="200" y="308" font-family="monospace" font-size="11" fill="#a8a29e" text-anchor="middle">ACCURACY</text>
  <text x="200" y="330" font-family="monospace" font-size="22" fill="#34d399" text-anchor="middle" font-weight="bold">96%</text>
  <text x="315" y="308" font-family="monospace" font-size="11" fill="#a8a29e" text-anchor="middle">TIME</text>
  <text x="315" y="330" font-family="monospace" font-size="22" fill="#60a5fa" text-anchor="middle" font-weight="bold">60s</text>

  <!-- Label -->
  <text x="200" y="375" font-family="monospace" font-size="14" fill="#78716c" text-anchor="middle">type racer</text>
</svg>
